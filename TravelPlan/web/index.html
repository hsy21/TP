<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelPlan</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
</head>
<body>
    <header>
        <div class="logo">
            <i class="fas fa-wheelchair"></i> TravelPlan
        </div>
        <nav>
            <ul>
                <li><a href="#" class="active" id="nav-plan">내 일정</a></li>
                <li><a href="#" id="nav-community">커뮤니티</a></li>
            </ul>
        </nav>
        <div class="user-profile">
            <i class="fas fa-user-circle"></i> 사용자
        </div>
    </header>

    <main class="container">
        <!-- 좌측: 장소 검색 및 목록 -->
        <section class="sidebar">
            <h2>장소 검색</h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="장소, 맛집, 숙소 검색...">
                <button onclick="searchPlaces()"><i class="fas fa-search"></i></button>
            </div>
            <div class="category-filters">
                <button class="filter-btn active" data-category="all">전체</button>
                <button class="filter-btn" data-category="restaurant">맛집</button>
                <button class="filter-btn" data-category="attraction">관광</button>
                <button class="filter-btn" data-category="accommodation">숙소</button>
            </div>
            
            <div id="searchResults" class="place-list">
                <!-- 검색 결과가 여기에 표시됨 -->
                <div class="place-item skeleton">검색을 시작해보세요.</div>
            </div>
        </section>

        <!-- 중앙: 일정 계획 (내 일정 뷰) -->
        <section class="plan-board" id="planView">
            <h2>나의 여행 일정 <button class="btn-share"><i class="fas fa-share-alt"></i> 공유하기</button></h2>
            <div class="plan-timeline" id="planTimeline">
                <!-- 일정 아이템들이 여기에 추가됨 -->
                <div class="empty-state">
                    <i class="far fa-calendar-plus"></i>
                    <p>장소를 추가하여 일정을 만들어보세요.</p>
                </div>
            </div>
            
            <div class="plan-summary">
                <h3>일정 요약</h3>
                <div class="summary-details">
                    <p>총 이동 시간: <span id="totalMoveTime">0</span>분</p>
                    <p>총 체류 시간: <span id="totalStayTime">0</span>분</p>
                    <p class="total-time">예상 총 소요 시간: <span id="totalTime">0</span>분</p>
                    <p>예상 비용: <span id="totalCost">0</span>원</p>
                </div>
            </div>
        </section>

        <!-- 우측: 지도 (내 일정 뷰) -->
        <section class="map-container" id="mapView">
            <div id="map" class="map">
                <!-- 카카오맵 지도가 렌더링될 영역 -->
            </div>
        </section>

        <!-- 커뮤니티 뷰 (기본 숨김) -->
        <section class="community-board" id="communityView" style="display: none; flex: 1; padding: 2rem; background: var(--background-color); overflow-y: auto;">
            <h2>커뮤니티 (공유된 일정)</h2>
            <div class="community-list" id="communityList">
                <!-- 커뮤니티 글 목록 -->
            </div>
        </section>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <!-- 모달: 장소 추가 옵션 (체류시간, 메모, 접근성 태그 등) -->
    <div id="placeModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3 id="modalPlaceName">장소 이름</h3>
            
            <div class="form-group">
                <label>체류 시간 (분)</label>
                <input type="number" id="stayTime" value="60" min="0" step="10">
            </div>
            
            <div class="form-group">
                <label>배리어프리 태그</label>
                <div class="tags-container">
                    <label class="tag-checkbox"><input type="checkbox" value="wheelchair"> 휠체어 접근 가능</label>
                    <label class="tag-checkbox"><input type="checkbox" value="elevator"> 엘리베이터 있음</label>
                    <label class="tag-checkbox"><input type="checkbox" value="parking"> 장애인 주차장</label>
                    <label class="tag-checkbox"><input type="checkbox" value="stroller"> 유모차 대여</label>
                </div>
            </div>
            
            <div class="form-group">
                <label>이동 수단 (이전 장소에서)</label>
                <select id="transportMode">
                    <option value="walk">도보</option>
                    <option value="bus">버스</option>
                    <option value="subway">지하철</option>
                    <option value="taxi">택시</option>
                    <option value="wheelchair">휠체어</option>
                </select>
            </div>

            <div class="form-group">
                <label>메모</label>
                <textarea id="placeMemo" placeholder="주의사항이나 기억할 점을 적어주세요."></textarea>
            </div>
            
            <button id="addPlaceBtn" class="btn-primary">일정에 추가</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
