<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내가 작성한 루트 - TravelPlan</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a73e8">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">TravelPlan</div>
        <nav>
            <ul>
                <li><a href="index.html" id="nav-plan">내 일정 / 커뮤니티 돌아가기</a></li>
                <li><a href="#" class="active" id="nav-my-routes">내가 작성한 루트</a></li>
            </ul>
        </nav>
        <div class="user-profile" id="userProfile">
            <span id="userInfo" style="margin-right:10px;"></span>
            <button id="logoutBtn" class="btn-google-logout">로그아웃</button>
        </div>
    </header>

    <main class="container">
        <section class="community-board" style="flex: 1; padding: 2rem; background: var(--background-color); overflow-y: auto;">
            <h2>내가 작성한 루트</h2>
            <div id="myRoutesContainer"></div>
        </section>
    </main>

    <footer style="text-align: center; font-size: 0.7rem; color: #888; padding: 10px; margin-top: auto;">
        만든이: Ech | 전화번호: 010-2941-8064 | 이메일: hwangsiyoon@naver.com
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                alert('로그인이 필요합니다.');
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('userInfo').textContent = `${currentUser.username} (${currentUser.role === 'admin' ? '관리자' : '일반'})`;
            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.removeItem('currentUser');
                window.location.href = 'index.html';
            });

            try {
                const res = await fetch('/api/community');
                const communityPlans = await res.json();
                
                const myPlans = communityPlans.filter(p => p.author_id === currentUser.id);
                const list = document.getElementById('myRoutesContainer');
                
                if (myPlans.length === 0) {
                    list.innerHTML = '<p>작성한 루트가 없습니다.</p>';
                    return;
                }

                let html = '<div class="community-list">';
                myPlans.forEach(plan => {
                    const places = plan.items.map(i => i.name).join(' ➔ ');
                    html += `
                        <div class="community-card">
                            <div class="community-header">
                                <div><h3 class="community-title">${plan.title}</h3></div>
                                <div class="community-meta">
                                    <span class="community-rating">평점 <i class="fas fa-star" style="color: gold;"></i> ${plan.avg_rating.toFixed(1)} (${plan.review_count}명)</span>
                                </div>
                            </div>
                            <div class="community-info">
                                <strong>작성자:</strong> ${plan.author}
                            </div>
                            <div class="community-course">
                                <strong>코스:</strong> ${places}
                            </div>
                            <div style="margin-top:10px;">
                                <button onclick="deletePlan(${plan.id})" class="btn-google btn-google-danger">삭제</button>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                list.innerHTML = html;
            } catch(e) {
                console.error(e);
            }
        });

        async function deletePlan(id) {
            if(!confirm('정말 이 일정을 삭제하시겠습니까?')) return;
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            try {
                const res = await fetch(`/api/community/${id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: currentUser.id, user_role: currentUser.role })
                });
                if(res.ok) {
                    alert('삭제되었습니다.');
                    location.reload();
                } else {
                    alert('삭제 권한이 없거나 오류가 발생했습니다.');
                }
            } catch(e) {
                console.error("Delete error:", e);
            }
        }
    </script>
</body>
</html>
